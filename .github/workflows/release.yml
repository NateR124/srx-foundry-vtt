name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Validate all tracked JSON
        run: |
          node -e "
            const { execSync } = require('child_process');
            const fs = require('fs');
            const files = execSync('git ls-files \"*.json\"', {encoding: 'utf8'}).split('\n').filter(Boolean);
            let bad = 0;
            for (const f of files) {
              try { JSON.parse(fs.readFileSync(f, 'utf8')); }
              catch (e) { console.error('INVALID JSON: ' + f + ' — ' + e.message); bad++; }
            }
            console.log(files.length + ' JSON files checked, ' + bad + ' invalid');
            process.exit(bad ? 1 : 0);
          "

      - name: Localization check
        run: npm run check:i18n

      - name: Rules purity check (module/rules must stay Foundry-free)
        run: |
          if grep -rnE "game\.|foundry\.[a-z]|canvas\.|ChatMessage|Hooks\." module/rules --include="*.mjs"; then
            echo "::error::module/rules/ must not reference Foundry APIs (see docs/ARCHITECTURE.md)"
            exit 1
          else
            echo "module/rules is Foundry-free"
          fi

      - name: Run vitest
        run: npm test

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build compendium packs
        run: |
          # Compile packs-src/** -> packs/** (JSON sources -> LevelDB). The
          # foundryvtt-cli is not a repo dependency, so install it on demand
          # without touching package-lock.json. If there are no pack sources,
          # this is a no-op and produces no packs/ directory.
          if [ -d packs-src ]; then
            npm install --no-save @foundryvtt/foundryvtt-cli@3.0.4
            npm run build:packs
          else
            echo "no packs-src/ — skipping pack build"
          fi

      - name: Zip release
        run: |
          # Foundry install zip: system.json at the ARCHIVE ROOT (no wrapper
          # folder) — the installer extracts straight into Data/systems/srx.
          # `packs` holds the compiled LevelDB compendia built above.
          mkdir stage
          # CONTENT-NOTICE.md must travel with the compendium content it covers.
          for p in module templates styles lang packs assets ui system.json package.json README.md LICENSE LICENSE.md CONTENT-NOTICE.md; do
            if [ -e "$p" ]; then cp -r "$p" stage/; fi
          done
          cd stage && zip -r ../srx.zip . && cd ..

      - name: Create release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            srx.zip
            system.json
          generate_release_notes: true
