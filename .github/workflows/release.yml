name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Validate system.json
        run: npx jsonlint system.json -q

      - name: Run vitest
        run: npm test

  build:
    needs: test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip release
        run: |
          mkdir srx
          cp -r apps assets lang module styles templates ui system.json srx/ || true
          zip -r srx.zip srx/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            srx.zip
            system.json
